version: "3.7"
services:
  api:
      image: node:23.11.0-alpine
      container_name: api
      working_dir: /API
      env_file:
        - .env 
      entrypoint: ["/bin/sh", "./scripts/startup.sh"]
      volumes:
          - ./:/API
      depends_on:
          - db
      ports:
        - "8080:8080"
  db:
      image: postgres:14
      container_name: template_db
      restart: always
      ports:
          - "5427:5432"
      environment:
          POSTGRES_USER: template
          POSTGRES_PASSWORD: password
          POSTGRES_DB: template-db
      volumes:
        - ./template-db:/var/lib/postgresql/data
